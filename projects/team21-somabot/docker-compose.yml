services:
  api:
    build:
      context: .
      dockerfile: sadari_front/Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: sadari_front/Dockerfile
    command: streamlit run sadari_front/app/ui.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
