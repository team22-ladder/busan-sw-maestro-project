# Gemini Code Assist for GitHub — repo 설정
# https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM  # LOW/nit 코멘트 노이즈 차단
  max_review_comments: -1

  pull_request_opened:
    help: false        # 도움말 코멘트 X
    summary: true      # PR 요약 O
    code_review: true  # 첫 리뷰 O

  pull_request_updated:
    code_review: true  # 새 push 마다 자동 재리뷰

ignore_patterns:
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.pyo"
  - "data/**"          # ChromaDB, 임베딩 등 런타임 생성 파일
  - "**/.env"
  - "docs/**"          # 설계 문서는 리뷰 제외
  - "**/*.npy"
  - "**/*.csv"
