services:
  vectordb:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/.chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=vectordb
      - CHROMA_PORT=8000
      - DATA_PATH=/app/data/visas
    volumes:
      - ./data:/app/data:ro
    depends_on:
      vectordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # api = http://localhost:8000 (순수 JSON/SSE API)

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      # ⚠️ 브라우저에 주입되는 주소이므로 host에서 접근 가능한 localhost:8000 이어야 한다(컨테이너명 api:8000 아님)
      - API_BASE_URL=http://localhost:8000
      - PORT=3000
    depends_on:
      api:
        condition: service_healthy
    # 고객 UI = http://localhost:3000/

volumes:
  chroma_data:
