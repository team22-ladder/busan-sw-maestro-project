services:
  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/detective_secret
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7474"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: detective_db
      POSTGRES_USER: detective
      POSTGRES_PASSWORD: detective_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detective -d detective_db"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./BE
    image: detective-agent-be:local
    env_file:
      - ./.secret/.env
    environment:
      AI_LLM_PROVIDER: upstage
      AI_UPSTAGE_MODEL_NAME: solar-pro
      AI_MODEL_NAME: gpt-4o-mini
      AI_TONE_MODEL_NAME: solar-pro
      BE_DEBUG_TOOLS_ENABLED: "true"
      BE_NEO4J_URI: bolt://neo4j:7687
      BE_NEO4J_USER: neo4j
      BE_NEO4J_PASSWORD: detective_secret
      BE_DATABASE_URL: postgresql://detective:detective_secret@postgres:5432/detective_db
    volumes:
      - backend-sessions:/app/data/sessions
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./FE
      args:
        VITE_API_BASE_URL: ""
    image: detective-agent-fe:local
    environment:
      API_PROXY_PASS: http://backend:8000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-sessions:
  neo4j_data:
  postgres_data:
