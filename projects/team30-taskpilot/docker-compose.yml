services:
  api:
    build: {context: ., dockerfile: Dockerfile.api}
    ports: ['8001:8001']
    env_file: [.env]
    volumes: [chroma_data:/app/chroma_data]
  frontend:
    build: {context: ., dockerfile: Dockerfile.frontend}
    ports: ['5173:5173']
    environment: [VITE_API_BASE_URL=http://localhost:8001]
    depends_on: [api]
volumes:
  chroma_data:
