services:
  mysql:
    image: mysql:8.0
    ports: ['3306:3306']
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: minecraft
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 5s
      timeout: 3s
      retries: 15

  qdrant:
    image: qdrant/qdrant:latest
    ports: ['6333:6333', '6334:6334']
    volumes: [qdrant_data:/qdrant/storage]

  api:
    build: {context: ., dockerfile: Dockerfile.api}
    ports: ['8001:8001']
    env_file:
      - path: .env
        required: false
    # 컨테이너 내부에서는 서비스명으로 접속 (.env의 localhost 값을 덮어씀)
    environment:
      - DATABASE_URL=mysql+pymysql://app:app@mysql:3306/minecraft
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      mysql: {condition: service_healthy}
      qdrant: {condition: service_started}

  frontend:
    build: {context: ., dockerfile: Dockerfile.frontend}
    ports: ['8002:8002']
    environment: [BACKEND_URL=http://api:8001]
    depends_on: [api]

volumes:
  mysql_data:
  qdrant_data:
