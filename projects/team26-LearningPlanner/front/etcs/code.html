<script>
        // Hero Slideshow Logic
        const initSlideshow = () => {
            const slides = document.querySelectorAll('#hero-slideshow img');
            if (slides.length <= 1) return;

            let currentIndex = 0;
            const intervalTime = 5000; // Updated to 5 seconds

            // Respect prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            
            if (prefersReducedMotion) {
                return;
            }

            setInterval(() => {
                slides[currentIndex].classList.replace('opacity-100', 'opacity-0');
                currentIndex = (currentIndex + 1) % slides.length;
                slides[currentIndex].classList.replace('opacity-0', 'opacity-100');
            }, intervalTime);
        };

        // Smooth reveal animations on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: "0px 0px -50px 0px"
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-10');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.glass-card').forEach(card => {
            card.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-10');
            observer.observe(card);
        });

        // Sticky Navbar effect
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white/90', 'border-black/10', 'shadow-sm');
            } else {
                nav.classList.remove('bg-white/90', 'border-black/10', 'shadow-sm');
            }
        });

        // Initialize scripts
        document.addEventListener('DOMContentLoaded', () => {
            initSlideshow();
        });
    </script>
